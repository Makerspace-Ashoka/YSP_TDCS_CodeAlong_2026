; YSP TDCS Makerspace — Seeed Studio XIAO ESP32C3
; Platform version pinned at Task 17 (espressif32@7.0.1, verified 2026-05-25).

[platformio]
core_dir = .pio-core
src_dir = my_robot_code

[env:seeed_xiao_esp32c3]
platform = platformio/espressif32@7.0.1
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 460800
lib_extra_dirs = robot_core
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ 3.0.3
    adafruit/Adafruit BusIO @ 1.17.4
    teckel12/NewPing @ 1.9.7
    bblanchon/ArduinoJson @ 7.2.2
    madhephaestus/ESP32Servo @ 3.2.0
    adafruit/Adafruit NeoPixel @ 1.15.5
